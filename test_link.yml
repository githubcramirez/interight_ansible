- name: "Prueba de Ruta API Intersight"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Definimos los datos de conexión como variables normales
    intersight_creds:
      api_private_key: "{{ api_private_key }}"
      api_key_id: "{{ api_key_id }}"
      api_uri: "https://intersight.com"
      validate_certs: true

  tasks:
    - name: "Validar Ruta 1: Con prefijo /api/v1/"
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ intersight_creds.api_private_key }}"
        api_key_id: "{{ intersight_creds.api_key_id }}"
        api_uri: "{{ intersight_creds.api_uri }}"
        validate_certs: "{{ intersight_creds.validate_certs }}"
        resource_path: "/api/v1/organization/Organizations"
        method: GET
      register: res_full
      ignore_errors: true

    - name: "Validar Ruta 2: Sin prefijo (solo recurso)"
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ intersight_creds.api_private_key }}"
        api_key_id: "{{ intersight_creds.api_key_id }}"
        api_uri: "{{ intersight_creds.api_uri }}"
        validate_certs: "{{ intersight_creds.validate_certs }}"
        resource_path: "organization/Organizations"
        method: GET
      register: res_short
      ignore_errors: true

    - name: "Resultados del Diagnóstico"
      debug:
        msg: 
          - "Ruta con /api/v1/ -> Estado: {{ res_full.api_response.LastStatus | default(res_full.msg) }}"
          - "Ruta sin prefijo -> Estado: {{ res_short.api_response.LastStatus | default(res_short.msg) }}"
