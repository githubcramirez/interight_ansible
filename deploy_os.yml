---
- name: Deploy RHEL 9.6 via Cisco Intersight OS Install API
  hosts: localhost
  gather_facts: false
  vars:
    intersight_api_uri: "https://intersight.com/api/v1"
    intersight_api_key_id: "6514bd3c7564613301ee9d9e/69d930c875646132012d5f60/69e25bb7756461320110e94d"
    
    # Target Server
    server_moid: "694079a476752d350132ed67"
    
    # Organization
    org_moid: "6941a14c69726532017eee83"
    
    # OS Image & SCU
    os_image_moid: "69d834db656761320134863c"
    scu_moid: "69d8350d6567613201348afd"
    
    # Configuration File (original RHEL96.ks with --iscrypted)
    config_file_moid: "69ea3ac065cce50201655eee"
    
    # Network Parameters
    ip_address: "198.19.202.101"
    netmask: "255.255.255.0"
    gateway: "198.19.202.1"
    nameserver: "198.19.254.82"
    hostname: "server01"
    network_device: "eth1"
    root_password: "YourEncryptedOrPlainPasswordHere"

  tasks:
    - name: Create OS Install via Intersight API
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ intersight_api_key_id }}"
        api_uri: "{{ intersight_api_uri }}"
        resource_path: "/os/Installs"
        state: present
        api_body:
          Name: "RHEL96-Install-server01"
          InstallMethod: "vMedia"
          OverrideSecureBoot: true
          Organization:
            ClassId: "mo.MoRef"
            ObjectType: "organization.Organization"
            Moid: "{{ org_moid }}"
          Server:
            ClassId: "mo.MoRef"
            ObjectType: "compute.Blade"
            Moid: "{{ server_moid }}"
          Image:
            ClassId: "mo.MoRef"
            ObjectType: "softwarerepository.OperatingSystemFile"
            Moid: "{{ os_image_moid }}"
          OsduImage:
            ClassId: "mo.MoRef"
            ObjectType: "firmware.ServerConfigurationUtilityDistributable"
            Moid: "{{ scu_moid }}"
          ConfigurationFile:
            ClassId: "mo.MoRef"
            ObjectType: "os.ConfigurationFile"
            Moid: "{{ config_file_moid }}"
          InstallTarget:
            ClassId: "os.VirtualDrive"
            ObjectType: "os.VirtualDrive"
            Name: "MStorBootVd"
            StorageControllerSlotId: "MSTOR-RAID"
            Id: "0"
          Answers:
            ClassId: "os.Answers"
            ObjectType: "os.Answers"
            Source: "Template"
            IpConfigType: "static"
            Hostname: ""
            IpConfiguration: null
            IsRootPasswordCrypted: false
            IsRootPasswordSet: false
            Nameserver: ""
            NetworkDevice: ""
            AlternateNameServers: []
            ProductKey: ""
          AdditionalParameters:
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".RootPassword"
                Label: ".RootPassword"
                Description: ""
                Required: false
                Default:
                  ClassId: "workflow.DefaultValue"
                  ObjectType: "workflow.DefaultValue"
                  IsValueSet: false
                  Override: false
                  Value: null
                DisplayMeta:
                  ClassId: "workflow.DisplayMeta"
                  ObjectType: "workflow.DisplayMeta"
                  InventorySelector: true
                  WidgetType: "None"
                InputParameters: null
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Secure: false
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    EnumList: []
                    Max: 0
                    Min: 0
                    Regex: ""
                  DataSourceSelector: []
                  InventorySelector: []
              Value: "{{ root_password }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpConfigType"
                Label: ".IpConfigType"
                Description: ""
