---
- name: "Cisco Intersight - Despliegue RHEL 9.6 Producción"
  hosts: all
  connection: local
  gather_facts: false

  vars:
    # Credenciales y Conexión
    api_info: &api_info
      api_private_key: "{{ api_private_key | default(omit) }}"
      api_key_id: "{{ api_key_id | default(omit) }}"
      api_uri: "{{ api_uri | default('https://intersight.com') }}"
      validate_certs: true

    # Variables de Imágenes (Asegúrate que estos nombres coincidan en tu Intersight)
    os_image_name: "Red Hat Enterprise Linux 9.6"
    os_config_file: "RHEL96.ks"
    scu_image_name: "SCU-7.1.5.250100"
    
    # --- DATOS DE RED REALES ---
    target_ip: "198.19.202.101"
    target_gateway: "198.19.202.1"
    target_netmask: "255.255.255.0"
    target_dns: "198.19.254.82"
    target_ntp: "198.19.255.137"
    network_device: "eth1"
    target_hostname: "server01"

  tasks:
    # --- BÚSQUEDA DE RECURSOS ---
    - name: "Obtener Moid de Organización"
      cisco.intersight.intersight_rest_api:
        <<: *api_info
        resource_path: /organization/Organizations
        query_params:
          $filter: "Name eq '{{ organization }}'"
      register: org_resp

    - name: "Obtener Moid del Servidor"
      cisco.intersight.intersight_rest_api:
        <<: *api_info
        resource_path: /compute/PhysicalSummaries
        query_params:
          $filter: "Name eq '{{ server_name }}'"
      register: server_search

    - name: "Obtener Moid de Imagen SO, SCU y Config"
      cisco.intersight.intersight_rest_api:
        <<: *api_info
        resource_path: "{{ item.path }}"
        query_params:
          $filter: "Name eq '{{ item.name }}'"
      loop:
        - { path: '/softwarerepository/OperatingSystemFiles', name: '{{ os_image_name }}' }
        - { path: '/firmware/ServerConfigurationUtilityDistributables', name: '{{ scu_image_name }}' }
        - { path: '/os/ConfigurationFiles', name: '{{ os_config_file }}' }
      register: resources_resp

    # --- DESPLIEGUE ---
    - name: "Lanzar Instalación de SO"
      cisco.intersight.intersight_rest_api:
        <<: *api_info
        resource_path: /bulk/Requests
        update_method: post
        api_body: {
          "Requests": [
            {
              "Body": {
                "Answers": {
                  "Hostname": "{{ target_hostname }}",
                  "IpConfigType": "static",
                  "IpConfiguration": {
                    "ObjectType": "os.Ipv4Configuration",
                    "IpV4Config": {
                      "Gateway": "{{ target_gateway }}",
                      "IpAddress": "{{ target_ip }}",
                      "Netmask": "{{ target_netmask }}"
                    }
                  },
                  "Nameserver": "{{ target_dns }}",
                  "NtpServers": ["{{ target_ntp }}"],
                  "NetworkDevice": "{{ network_device }}",
                  "RootPassword": "{{ vault_password }}",
                  "Source": "Template"
                },
                "ConfigurationFile": { "Moid": "{{ resources_resp.results[2].api_response.Results[0].Moid }}", "ObjectType": "os.ConfigurationFile" },
                "Image": { "Moid": "{{ resources_resp.results[0].api_response.Results[0].Moid }}", "ObjectType": "softwarerepository.OperatingSystemFile" },
                "OsduImage": { "Moid": "{{ resources_resp.results[1].api_response.Results[0].Moid }}", "ObjectType": "firmware.ServerConfigurationUtilityDistributable" },
                "InstallMethod": "vMedia",
                "InstallTarget": {
                  "Id": "0",
                  "Name": "vd0",
                  "ObjectType": "os.VirtualDrive",
                  "StorageControllerSlotId": "Embedded" 
                },
                "Organization": { "Moid": "{{ org_resp.api_response.Results[0].Moid }}", "ObjectType": "organization.Organization" },
                "Server": { 
                   "Moid": "{{ server_search.api_response.Results[0].SourceMoid }}", 
                   "ObjectType": "{{ server_search.api_response.Results[0].SourceObjectType }}" 
                }
              },
              "ObjectType": "bulk.RestSubRequest"
            }
          ],
          "Uri": "/v1/os/Installs",
          "Verb": "POST"
        }
      register: install_resp

    - name: "ID de Workflow generado"
      debug:
        msg: "Instalación iniciada. Moid del Request: {{ install_resp.api_response.Results[0].Body.Moid }}"
