---
- name: Cisco Intersight OS Install - Parameterized
  hosts: localhost
  gather_facts: no
  connection: local

  vars:
    # AWX Survey Variables (provided by user at launch)
    # server_name: "CX-DCC-DL2-S9108-AI-1-1-5"
    # org_name: "AI-Workloads"
    # os_image_name: "Red Hat Enterprise Linux 9.6"
    # scu_name: "SCU-7.1.5.250100"
    # config_file_name: "RHEL96_v30.ks"
    # ip_address: "198.19.202.101"
    # netmask: "255.255.255.0"
    # gateway: "198.19.202.1"
    # nameserver: "198.19.254.82"
    # hostname: "server01"
    # network_device: "eth1"
    # root_password: "YourPassword"

    # Static vars
    api_key_id: "6514bd3c7564613301ee9d9e/69d930c875646132012d5f60/69e25bb7756461320110e94d"
    # api_private_key injected by AWX credential type

  tasks:
    # =========================================================
    # PHASE 1: Resolve Names to Moids
    # =========================================================

    - name: Resolve Organization Moid
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        resource_path: "/organization/Organizations"
        query_params:
          $filter: "Name eq '{{ org_name }}'"
        return_list: true
      register: org_result

    - name: Resolve Server Moid
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        resource_path: "/compute/Blades"
        query_params:
          $filter: "Name eq '{{ server_name }}'"
        return_list: true
      register: server_result

    - name: Resolve OS Image Moid
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        resource_path: "/softwarerepository/OperatingSystemFiles"
        query_params:
          $filter: "Name eq '{{ os_image_name }}'"
        return_list: true
      register: os_image_result

    - name: Resolve SCU Moid
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        resource_path: "/firmware/ServerConfigurationUtilityDistributables"
        query_params:
          $filter: "Name eq '{{ scu_name }}'"
        return_list: true
      register: scu_result

    - name: Resolve Config File Moid
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        resource_path: "/os/ConfigurationFiles"
        query_params:
          $filter: "Name eq '{{ config_file_name }}'"
        return_list: true
      register: config_file_result

    # =========================================================
    # PHASE 2: Extract and Validate Moids
    # =========================================================

    - name: Set Moid facts
      ansible.builtin.set_fact:
        org_moid: "{{ org_result.api_response[0].Moid | default('') }}"
        server_moid: "{{ server_result.api_response[0].Moid | default('') }}"
        os_image_moid: "{{ os_image_result.api_response[0].Moid | default('') }}"
        scu_moid: "{{ scu_result.api_response[0].Moid | default('') }}"
        config_file_moid: "{{ config_file_result.api_response[0].Moid | default('') }}"

    - name: Display resolved Moids
      ansible.builtin.debug:
        msg:
          - "Organization '{{ org_name }}': {{ org_moid }}"
          - "Server '{{ server_name }}': {{ server_moid }}"
          - "OS Image '{{ os_image_name }}': {{ os_image_moid }}"
          - "SCU '{{ scu_name }}': {{ scu_moid }}"
          - "Config File '{{ config_file_name }}': {{ config_file_moid }}"

    - name: Validate all Moids resolved successfully
      ansible.builtin.assert:
        that:
          - org_moid | length > 0
          - server_moid | length > 0
          - os_image_moid | length > 0
          - scu_moid | length > 0
          - config_file_moid | length > 0
        fail_msg: >
          One or more resources could not be resolved.
          Organization: '{{ org_moid }}',
          Server: '{{ server_moid }}',
          OS Image: '{{ os_image_moid }}',
          SCU: '{{ scu_moid }}',
          Config File: '{{ config_file_moid }}'
        success_msg: "All Moids resolved successfully."

    # =========================================================
    # PHASE 3: Execute OS Install
    # =========================================================

    - name: Trigger OS Install via Intersight API
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        resource_path: "/os/Installs"
        state: present
        api_body:
          Name: "OS_Install_{{ server_name }}"
          ObjectType: "os.Install"
          ClassId: "os.Install"
          InstallMethod: "vMedia"
          OverrideSecureBoot: true
          Organization:
            ObjectType: "organization.Organization"
            Moid: "{{ org_moid }}"
          Server:
            ObjectType: "compute.Blade"
            Moid: "{{ server_moid }}"
          Image:
            ObjectType: "softwarerepository.OperatingSystemFile"
            Moid: "{{ os_image_moid }}"
          OsduImage:
            ObjectType: "firmware.ServerConfigurationUtilityDistributable"
            Moid: "{{ scu_moid }}"
          ConfigurationFile:
            ObjectType: "os.ConfigurationFile"
            Moid: "{{ config_file_moid }}"
          InstallTarget:
            ObjectType: "os.VirtualDrive"
            ClassId: "os.VirtualDrive"
            Id: "0"
            Name: "MStorBootVd"
            StorageControllerSlotId: "MSTOR-RAID"
          Answers:
            ObjectType: "os.Answers"
            ClassId: "os.Answers"
            Source: "Template"
            IpConfigType: "static"
            IpConfiguration:
              ObjectType: "os.Ipv4Configuration"
              ClassId: "os.Ipv4Configuration"
            Hostname: ""
            NetworkDevice: ""
            RootPassword: ""
            IsRootPasswordCrypted: false
            Nameserver: ""
          AdditionalParameters:
            - ObjectType: "os.PlaceHolder"
              ClassId: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ObjectType: "workflow.PrimitiveDataType"
                ClassId: "workflow.PrimitiveDataType"
                Name: "Hostname"
                Label: "Hostname"
                Description: "Hostname for the server"
                Required: true
                Default:
                  ObjectType: "workflow.DefaultValue"
                  ClassId: "workflow.DefaultValue"
                  Override: false
                  Value: ""
                DisplayMeta:
                  ObjectType: "workflow.DisplayMeta"
                  ClassId: "workflow.DisplayMeta"
                  InventorySelector: true
                  WidgetType: "None"
                InputParameters: null
                Properties:
                  ObjectType: "workflow.PrimitiveDataProperty"
                  ClassId: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Secure: false
                  Constraints:
                    ObjectType: "workflow.Constraints"
                    ClassId: "workflow.Constraints"
                    EnumList: []
                    Max: 0
                    Min: 0
                    Regex: ""
                    DataSourceSelector: []
                    InventorySelector: []
              Value: "{{ hostname }}"
            - ObjectType: "os.PlaceHolder"
              ClassId: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ObjectType: "workflow.PrimitiveDataType"
                ClassId: "workflow.PrimitiveDataType"
                Name: "RootPassword"
                Label: "Root Password"
                Description: "Root password for the server"
                Required: true
                Default:
                  ObjectType: "workflow.DefaultValue"
                  ClassId: "workflow.DefaultValue"
                  Override: false
                  Value: ""
                DisplayMeta:
                  ObjectType: "workflow.DisplayMeta"
                  ClassId: "workflow.DisplayMeta"
                  InventorySelector: true
                  WidgetType: "None"
                InputParameters: null
                Properties:
                  ObjectType: "workflow.PrimitiveDataProperty"
                  ClassId: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Secure: true
                  Constraints:
                    ObjectType: "workflow.Constraints"
                    ClassId: "workflow.Constraints"
                    EnumList: []
                    Max: 0
                    Min: 0
                    Regex: ""
                    DataSourceSelector: []
                    InventorySelector: []
              Value: "{{ root_password }}"
            - ObjectType: "os.PlaceHolder"
              ClassId: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ObjectType: "workflow.PrimitiveDataType"
                ClassId: "workflow.PrimitiveDataType"
                Name: "NetworkDevice"
                Label: "Network Device"
                Description: "Network device for the server"
                Required: true
                Default:
                  ObjectType: "workflow.DefaultValue"
                  ClassId: "workflow.DefaultValue"
                  Override: false
                  Value: ""
                DisplayMeta:
                  ObjectType: "workflow.DisplayMeta"
                  ClassId: "workflow.DisplayMeta"
                  InventorySelector: true
                  WidgetType: "None"
                InputParameters: null
                Properties:
                  ObjectType: "workflow.PrimitiveDataProperty"
                  ClassId: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Secure: false
                  Constraints:
                    ObjectType: "workflow.Constraints"
                    ClassId: "workflow.Constraints"
                    EnumList: []
                    Max: 0
                    Min: 0
                    Regex: ""
                    DataSourceSelector: []
                    InventorySelector: []
              Value: "{{ network_device }}"
            - ObjectType: "os.PlaceHolder"
              ClassId: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ObjectType: "workflow.PrimitiveDataType"
                ClassId: "workflow.PrimitiveDataType"
                Name: "IpAddress"
                Label: "IP Address"
                Description: "IPv4 address for the server"
                Required: true
                Default:
                  ObjectType: "workflow.DefaultValue"
                  ClassId: "workflow.DefaultValue"
                  Override: false
                  Value: ""
                DisplayMeta:
                  ObjectType: "workflow.DisplayMeta"
                  ClassId: "workflow.DisplayMeta"
                  InventorySelector: true
                  WidgetType: "None"
                InputParameters: null
                Properties:
                  ObjectType: "workflow.PrimitiveDataProperty"
                  ClassId: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Secure: false
                  Constraints:
                    ObjectType: "workflow.Constraints"
                    ClassId: "workflow.Constraints"
                    EnumList: []
                    Max: 0
                    Min: 0
                    Regex: ""
                    DataSourceSelector: []
                    InventorySelector: []
              Value: "{{ ip_address }}"
            - ObjectType: "os.PlaceHolder"
              ClassId: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ObjectType: "workflow.PrimitiveDataType"
                ClassId: "workflow.PrimitiveDataType"
                Name: "Netmask"
                Label: "Netmask"
                Description: "Subnet mask for the server"
                Required: true
                Default:
                  ObjectType: "workflow.DefaultValue"
                  ClassId: "workflow.DefaultValue"
                  Override: false
                  Value: ""
                DisplayMeta:
                  ObjectType: "workflow.DisplayMeta"
                  ClassId: "workflow.DisplayMeta"
                  InventorySelector: true
                  WidgetType: "None"
                InputParameters: null
                Properties:
                  ObjectType: "workflow.PrimitiveDataProperty"
                  ClassId: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Secure: false
                  Constraints:
                    ObjectType: "workflow.Constraints"
                    ClassId: "workflow.Constraints"
                    EnumList: []
                    Max: 0
                    Min: 0
                    Regex: ""
                    DataSourceSelector: []
                    InventorySelector: []
              Value: "{{ netmask }}"
            - ObjectType: "os.PlaceHolder"
              ClassId: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ObjectType: "workflow.PrimitiveDataType"
                ClassId: "workflow.PrimitiveDataType"
                Name: "Gateway"
                Label: "Gateway"
                Description: "Default gateway for the server"
                Required: true
