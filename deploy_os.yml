---
- name: Deploy RHEL 9.6 via Intersight OS Install API
  hosts: localhost
  gather_facts: false
  vars:
    intersight_api_uri: "https://us-east-1.intersight.com/api/v1"
    intersight_api_key_id: "6514bd3c7564613301ee9d9e/69d930c875646132012d5f60/69e25bb7756461320110e94d"
    intersight_api_private_key: "{{ lookup('file', '/opt/intersight/SecretKey.txt') }}"

    # Pre-resolved Moids
    server_moid: "694079a476752d350132ed67"
    org_moid: "6941a14c69726532017eee83"
    os_image_moid: "69d834db656761320134863c"
    scu_moid: "69d8350d6567613201348afd"
    config_file_moid: "69fadca8628b5ff101f0c536"

    # Network Configuration
    hostname: "server01"
    ip_address: "198.19.202.101"
    netmask: "255.255.255.0"
    gateway: "198.19.202.1"
    dns_server: "198.19.254.82"
    ntp_server: "198.19.255.137"
    network_device: "eth1"
    root_password: "Cisco123!"

  tasks:
    - name: Initiate OS Install via Intersight API
      cisco.intersight.intersight_rest_api:
        api_uri: "{{ intersight_api_uri }}"
        api_key_id: "{{ intersight_api_key_id }}"
        api_private_key: "{{ intersight_api_private_key }}"
        resource_path: /os/Installs
        update_method: post
        api_body:
          ClassId: "os.Install"
          ObjectType: "os.Install"
          Name: "RHEL96-Deploy-server01"
          Description: "RHEL 9.6 deployment on CX-DCC-DL2-S9108-AI-1-1-5"
          InstallMethod: "vMedia"
          OverrideSecureBoot: true
          Server:
            ClassId: "mo.MoRef"
            ObjectType: "compute.Blade"
            Moid: "{{ server_moid }}"
          Organization:
            ClassId: "mo.MoRef"
            ObjectType: "organization.Organization"
            Moid: "{{ org_moid }}"
          Image:
            ClassId: "mo.MoRef"
            ObjectType: "softwarerepository.OperatingSystemFile"
            Moid: "{{ os_image_moid }}"
          OsduImage:
            ClassId: "mo.MoRef"
            ObjectType: "firmware.ServerConfigurationUtilityDistributable"
            Moid: "{{ scu_moid }}"
          ConfigurationFile:
            ClassId: "mo.MoRef"
            ObjectType: "os.ConfigurationFile"
            Moid: "{{ config_file_moid }}"
          Answers:
            ClassId: "os.Answers"
            ObjectType: "os.Answers"
            Source: "Template"
            Hostname: ""
            IpAddress: ""
            Nameserver: ""
            NetworkDevice: ""
            RootPassword: ""
            IsRootPasswordSet: false
            IsRootPasswordCrypted: false
            IpConfiguration: null
          InstallTarget:
            ClassId: "os.VirtualDrive"
            ObjectType: "os.VirtualDrive"
            Id: "0"
            Name: "MStorBootVd"
            StorageControllerSlotId: "MSTOR-RAID"
          AdditionalParameters:
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".RootPassword"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ root_password }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Hostname"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ hostname }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpAddress"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ ip_address }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Netmask"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ netmask }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Gateway"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ gateway }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Nameserver"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ dns_server }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".NetworkDevice"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ network_device }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".NtpServer"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: "{{ ntp_server }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Ipv6Address"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: ""
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Ipv6Prefix"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: ""
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Ipv6Gateway"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Type: "string"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
              Value: ""
      register: os_install_result

    - name: Display OS Install Result
      ansible.builtin.debug:
        var: os_install_result
