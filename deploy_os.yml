---
- name: Deploy RHEL 9.6 via Intersight OS Install API
  hosts: localhost
  gather_facts: false
  vars:
    intersight_api_url: "https://intersight.com/api/v1"
    api_key_id: "6514bd3c7564613301ee9d9e/69d930c875646132012d5f60/69e25bb7756461320110e94d"
    # api_private_key injected by AWX credential type "Intersight_TD"

    # Moids
    org_moid: "6941a14c69726532017eee83"
    server_moid: "694079a476752d350132ed67"
    os_image_moid: "69d834db656761320134863c"
    scu_image_moid: "69d8350d6567613201348afd"
    config_file_moid: "69fadca8628b5ff101f0c536"  # RHEL96_v30.ks (plaintext password)

    # Network Configuration
    ip_address: "198.19.202.101"
    netmask: "255.255.255.0"
    gateway: "198.19.202.1"
    nameserver: "198.19.254.82"
    hostname: "rhel96-blade"
    network_device: "eth1"
    root_password: "Cisco@123"

  tasks:
    - name: Intersight OS Install - RHEL 9.6 on UCSX-210C-M7
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        api_uri: "{{ intersight_api_url }}"
        resource_path: /os/Installs
        state: present
        api_body:
          Name: "RHEL96-Install-AWX"
          InstallMethod: "vMedia"
          OverrideSecureBoot: true
          Organization:
            ObjectType: "organization.Organization"
            Moid: "{{ org_moid }}"
          Server:
            ObjectType: "compute.Blade"
            Moid: "{{ server_moid }}"
          Image:
            ObjectType: "softwarerepository.OperatingSystemFile"
            Moid: "{{ os_image_moid }}"
          OsduImage:
            ObjectType: "firmware.ServerConfigurationUtilityDistributable"
            Moid: "{{ scu_image_moid }}"
          ConfigurationFile:
            ObjectType: "os.ConfigurationFile"
            Moid: "{{ config_file_moid }}"
          InstallTarget:
            ClassId: "os.VirtualDrive"
            ObjectType: "os.VirtualDrive"
            Name: "MStorBootVd"
            StorageControllerSlotId: "MSTOR-RAID"
          Answers:
            ClassId: "os.Answers"
            ObjectType: "os.Answers"
            Source: "Template"
            Hostname: ""
            IpConfigType: "static"
            IpConfiguration: null
            Nameserver: ""
            NetworkDevice: ""
            RootPassword: ""
            IsRootPasswordCrypted: false
          AdditionalParameters:
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".RootPassword"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".RootPassword"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 64
                    Min: 1
                  Type: "string"
                  Secure: true
              Value: "{{ root_password }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".Hostname"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".Hostname"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 64
                    Min: 1
                  Type: "string"
                  Secure: false
              Value: "{{ hostname }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpVersion"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpVersion"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 10
                    Min: 1
                  Type: "string"
                  Secure: false
              Value: "IPv4"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpConfigType"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpConfigType"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 10
                    Min: 1
                  Type: "string"
                  Secure: false
              Value: "static"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpV4ConfigIpAddress"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpV4ConfigIpAddress"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 15
                    Min: 7
                  Type: "string"
                  Secure: false
              Value: "{{ ip_address }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpV4ConfigNetmask"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpV4ConfigNetmask"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 15
                    Min: 7
                  Type: "string"
                  Secure: false
              Value: "{{ netmask }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpV4ConfigGateway"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpV4ConfigGateway"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 15
                    Min: 7
                  Type: "string"
                  Secure: false
              Value: "{{ gateway }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".NameServer"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".NameServer"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 15
                    Min: 7
                  Type: "string"
                  Secure: false
              Value: "{{ nameserver }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".AlternateNameServer"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".AlternateNameServer"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 15
                    Min: 0
                  Type: "string"
                  Secure: false
              Value: ""
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".NetworkDevice"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".NetworkDevice"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 30
                    Min: 1
                  Type: "string"
                  Secure: false
              Value: "{{ network_device }}"
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpV6ConfigIpAddress"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpV6ConfigIpAddress"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 39
                    Min: 0
                  Type: "string"
                  Secure: false
              Value: ""
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpV6ConfigGateway"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpV6ConfigGateway"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 39
                    Min: 0
                  Type: "string"
                  Secure: false
              Value: ""
            - ClassId: "os.PlaceHolder"
              ObjectType: "os.PlaceHolder"
              IsValueSet: true
              Key: ".IpV6ConfigPrefix"
              Type:
                ClassId: "workflow.PrimitiveDataType"
                ObjectType: "workflow.PrimitiveDataType"
                Name: ".IpV6ConfigPrefix"
                Properties:
                  ClassId: "workflow.PrimitiveDataProperty"
                  ObjectType: "workflow.PrimitiveDataProperty"
                  Constraints:
                    ClassId: "workflow.Constraints"
                    ObjectType: "workflow.Constraints"
                    Max: 3
                    Min: 0
                  Type: "string"
                  Secure: false
              Value: ""
      register: os_install_result

    - name: Display OS Install Result
      ansible.builtin.debug:
        var: os_install_result
