---
- name: "Cisco Intersight - Despliegue RHEL 9.6 AI-Workloads"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Nombres de recursos verificados
    organization_name: "AI-Workloads"
    server_name: "CX-DCC-DL2-S9108-AI-1-1-5"
    os_image_name: "Red Hat Enterprise Linux 9.6"
    scu_image_name: "SCU-7.1.5.250100"
    os_config_file: "RHEL96.ks"
    
    # Configuración de Red
    target_ip: "198.19.202.101"
    target_gateway: "198.19.202.1"
    target_netmask: "255.255.255.0"
    target_dns: "198.19.254.82"
    target_ntp: "198.19.255.137"
    target_hostname: "server01"
    network_device: "eth1"

  tasks:
    - name: "1. Obtener Moid de la Organización"
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        api_uri: "https://intersight.com"
        resource_path: "/api/v1/organization/Organizations"
        query_params:
          $filter: "Name eq '{{ organization_name }}'"
      register: org_resp

    - name: "2. Obtener Moid del Servidor"
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        api_uri: "https://intersight.com"
        resource_path: "/api/v1/compute/PhysicalSummaries"
        query_params:
          $filter: "Name eq '{{ server_name }}'"
      register: server_search

    - name: "3. Obtener Moids de Software y Configuración"
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        api_uri: "https://intersight.com"
        resource_path: "/api/v1/{{ item.path }}"
        query_params:
          $filter: "Name eq '{{ item.name }}'"
      loop:
        - { path: 'softwarerepository/OperatingSystemFiles', name: '{{ os_image_name }}' }
        - { path: 'firmware/ServerConfigurationUtilityDistributables', name: '{{ scu_image_name }}' }
        - { path: 'os/ConfigurationFiles', name: '{{ os_config_file }}' }
      register: software_moids

    - name: "4. Ejecutar Instalación de SO en MStorBootVd"
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ api_private_key }}"
        api_key_id: "{{ api_key_id }}"
        api_uri: "https://intersight.com"
        resource_path: "/api/v1/os/Installations"
        update_method: POST
        api_body: {
          "ConfigurationSource": "Custom",
          "InstallMethod": "vMedia",
          "OverrideSecureBoot": true,
          "Answers": {
            "Hostname": "{{ target_hostname }}",
            "IpConfigType": "static",
            "IpConfiguration": {
              "ObjectType": "os.Ipv4Configuration",
              "IpV4Config": {
                "Gateway": "{{ target_gateway }}",
                "IpAddress": "{{ target_ip }}",
                "Netmask": "{{ target_netmask }}"
              }
            },
            "Nameserver": "{{ target_dns }}",
            "NtpServers": ["{{ target_ntp }}"],
            "NetworkDevice": "{{ network_device }}",
            "RootPassword": "{{ vault_password }}",
            "Source": "Custom"
          },
          "Image": { "Moid": "{{ software_moids.results[0].api_response.Results[0].Moid }}" },
          "OsduImage": { "Moid": "{{ software_moids.results[1].api_response.Results[0].Moid }}" },
          "ConfigurationFile": { "Moid": "{{ software_moids.results[2].api_response.Results[0].Moid }}" },
          "Organization": { "Moid": "{{ org_resp.api_response.Results[0].Moid }}" },
          "Server": {
            "Moid": "{{ server_search.api_response.Results[0].SourceMoid }}",
            "ObjectType": "{{ server_search.api_response.Results[0].SourceObjectType }}"
          },
          "StorageConfig": {
            "Moid": "MStorBootVd",
            "ObjectType": "os.VirtualDrive"
          }
        }
      register: deployment_result

    - name: "Resumen del Despliegue"
      debug:
        msg: "El despliegue de RHEL 9.6 ha sido enviado exitosamente al servidor {{ server_name }}."
